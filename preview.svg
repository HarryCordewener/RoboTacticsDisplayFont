<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#0a0a1a"/>

  <text x="600" y="60" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#666">RoboTacticsDisplay — Full Character Set Preview</text>

  <!-- Uppercase -->
  <text x="40" y="130" font-family="sans-serif" font-size="14" fill="#555">UPPERCASE</text>
  <text x="40" y="180" font-family="Robo Tactics Display" font-style="italic" font-size="56" fill="white">ABCDEFGHIJKLM</text>
  <text x="40" y="250" font-family="Robo Tactics Display" font-style="italic" font-size="56" fill="white">NOPQRSTUVWXYZ</text>

  <!-- Lowercase -->
  <text x="40" y="320" font-family="sans-serif" font-size="14" fill="#555">LOWERCASE</text>
  <text x="40" y="370" font-family="Robo Tactics Display" font-style="italic" font-size="56" fill="white">abcdefghijklm</text>
  <text x="40" y="440" font-family="Robo Tactics Display" font-style="italic" font-size="56" fill="white">nopqrstuvwxyz</text>

  <!-- Digits -->
  <text x="40" y="510" font-family="sans-serif" font-size="14" fill="#555">DIGITS</text>
  <text x="40" y="560" font-family="Robo Tactics Display" font-style="italic" font-size="56" fill="white">0123456789</text>

  <!-- Punctuation -->
  <text x="40" y="630" font-family="sans-serif" font-size="14" fill="#555">PUNCTUATION &amp; SYMBOLS</text>
  <text x="40" y="680" font-family="Robo Tactics Display" font-style="italic" font-size="48" fill="white">! ? . , ; : - _ = + * @ # $ %</text>
  <text x="40" y="740" font-family="Robo Tactics Display" font-style="italic" font-size="48" fill="white">^ &amp; ~ ( ) [ ] { } / \ | ' " ` &lt; &gt;</text>

  <!-- Sample text -->
  <text x="40" y="820" font-family="sans-serif" font-size="14" fill="#555">SAMPLE</text>
  <text x="40" y="870" font-family="Robo Tactics Display" font-style="italic" font-size="44" fill="#ffd700">Super Robo Tactics: Episode #7 — 100% Complete!</text>
</svg>
